<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocQuery – Chat with your documents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a2e;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #22c55e;
      --accent-dim: rgba(34, 197, 94, 0.15);
      --user-msg: #27272a;
      --bot-msg: #1c1c1f;
      --err: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    header p {
      margin: 0.25rem 0 0;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 42rem;
      margin: 0 auto;
      width: 100%;
    }

    .msg {
      padding: 0.875rem 1rem;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent-dim);
      border: 1px solid rgba(34, 197, 94, 0.35);
      color: var(--text);
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-msg);
      border: 1px solid var(--border);
    }
    .msg.error {
      align-self: flex-start;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.4);
      color: var(--err);
    }
    .msg .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    #form-wrap {
      padding: 1rem 1.5rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    #form {
      max-width: 42rem;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
    }
    #input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 0.9375rem;
    }
    #input::placeholder {
      color: var(--text-muted);
    }
    #input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    #send {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #0f0f12;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    #send:hover {
      filter: brightness(1.08);
    }
    #send:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .typing {
      color: var(--text-muted);
      font-size: 0.875rem;
      padding: 0.5rem 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>DocQuery</h1>
    <p>Ask questions about your documents. The assistant uses your uploaded PDFs.</p>
  </header>

  <main id="messages"></main>

  <div id="form-wrap">
    <form id="form">
      <input type="text" id="input" placeholder="Ask something…" autocomplete="off" />
      <button type="submit" id="send">Send</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    const API_BASE =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://127.0.0.1:8000"
        : "https://docquery-backend.onrender.com";

    function addMessage(content, role, isError = false) {
      const div = document.createElement("div");
      div.className = "msg " + (isError ? "error" : role);
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = isError ? "Error" : role === "user" ? "You" : "Assistant";
      div.appendChild(label);
      const text = document.createElement("div");
      text.textContent = content;
      div.appendChild(text);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setLoading(on) {
      sendBtn.disabled = on;
      input.disabled = on;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = (input.value || "").trim();
      if (!message) return;

      input.value = "";
      addMessage(message, "user");

      setLoading(true);
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.textContent = "Thinking…";
      messagesEl.appendChild(typing);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch(API_BASE + "/dialogue", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        typing.remove();

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          addMessage(data.detail || "Request failed.", "bot", true);
          return;
        }
        addMessage(data.response || "No response.", "bot");
      } catch (err) {
        typing.remove();
        addMessage("Network error: " + (err.message || "Could not reach the server."), "bot", true);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
